name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Cache Swift Package Manager
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: ${{ runner.os }}-spm-
      - name: Build (SPM)
        run: swift build
      - name: Test (SPM)
        run: swift test
      - name: Build (Xcode)
        run: |
          xcodebuild -project Pulse.xcodeproj \
            -scheme Pulse \
            -configuration Debug \
            build \
            CODE_SIGN_IDENTITY="-" \
            DEVELOPMENT_TEAM="" \
            | xcpretty || true
